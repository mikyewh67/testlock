<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Zolo Wallet" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Zolo Wallet</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app" aria-label="Zolo Wallet fictional game companion app">
    <section id="payScreen" class="screen pay-screen active" data-screen="pay">
      <header class="app-header header-on-green">
        <button class="round-icon face-icon" type="button" aria-label="Profile mood">
          <span class="face-eyes"></span>
        </button>
        <div class="header-actions">
          <button id="scanFromPay" class="plain-icon scan-icon" type="button" aria-label="Scan code"></button>
          <button id="searchFromPay" class="plain-icon search-icon" type="button" aria-label="Search"></button>
          <button class="avatar-blue" type="button" aria-label="Account"><span></span><b>1</b></button>
        </div>
      </header>

      <section class="pay-amount-wrap">
        <div id="payAmount" class="amount-display amount-black">$0</div>
      </section>

      <section id="payKeypad" class="flat-keypad" aria-label="Payment keypad"></section>

      <section class="pay-actions">
        <button id="poolBtn" class="green-soft-btn" type="button">Pool</button>
        <button id="requestBtn" class="green-soft-btn" type="button">Request</button>
        <button id="payBtn" class="pay-main-btn" type="button">Pay</button>
      </section>
    </section>

    <section id="balanceScreen" class="screen dark-screen" data-screen="balance">
      <header class="app-header header-on-dark sticky-dark-top">
        <button class="round-icon face-icon dark-face" type="button" aria-label="Profile mood">
          <span class="face-eyes"></span>
        </button>
        <div class="header-actions">
          <button id="searchFromBalance" class="round-icon dark-search search-icon" type="button" aria-label="Search"></button>
          <button class="avatar-blue" type="button" aria-label="Account"><span></span><b>1</b></button>
        </div>
      </header>

      <div class="scroll-body balance-scroll">
        <section class="card-banner">
          <div class="banner-chip"></div>
          <span>Get your free game card</span>
        </section>

        <section class="balance-hero">
          <div class="balance-title-row">
            <button id="balanceDetailsBtn" class="balance-title" type="button">Game balance <span>›</span></button>
            <button id="hideBalanceBtn" class="eye-off" type="button" aria-label="Hide balance"></button>
          </div>
          <div id="balanceAmount" class="balance-big">$0.00</div>
        </section>

        <section class="balance-buttons">
          <button id="addMoneyBtn" class="dark-pill-btn" type="button">Add money</button>
          <button id="withdrawBtn" class="dark-pill-btn" type="button">Withdraw</button>
        </section>

        <button class="wide-card status-card" type="button">
          <span class="mini-phone"></span>
          <strong>Zolo Green</strong>
          <em>Earn status</em>
        </button>

        <section class="wide-card savings-card">
          <div>
            <h3>Savings</h3>
            <strong>$0.00</strong>
            <p>Up to 3.25% boost</p>
          </div>
          <div class="savings-orb">$</div>
        </section>

        <h2 class="section-heading">More for you</h2>
        <section class="wide-card promo-card">
          <p>File for free from your phone</p>
        </section>
      </div>
    </section>

    <section id="activityScreen" class="screen dark-screen" data-screen="activity">
      <header class="app-header header-on-dark sticky-dark-top">
        <button class="round-icon face-icon dark-face" type="button" aria-label="Profile mood">
          <span class="face-eyes"></span>
        </button>
        <div class="header-actions">
          <button id="searchFromActivity" class="round-icon dark-search search-icon" type="button" aria-label="Search"></button>
          <button class="avatar-blue" type="button" aria-label="Account"><span></span><b>1</b></button>
        </div>
      </header>

      <div class="scroll-body activity-scroll">
        <section class="stories-row" aria-label="Quick contacts">
          <button class="story story-plus" type="button"><span>+</span><strong>Get $500</strong></button>
          <button class="story story-pink" type="button"><span>J</span><strong>jasmine</strong></button>
          <button class="story story-photo one" type="button"><span></span><strong>Eunice</strong></button>
          <button class="story story-yellow" type="button"><span>R</span><strong>Rampag...</strong></button>
          <button class="story story-photo two" type="button"><span></span><strong>Mo</strong></button>
        </section>

        <h1 class="activity-heading">This month</h1>
        <section id="activityList" class="activity-list" aria-label="Recent activity"></section>
      </div>
    </section>

    <nav class="bottom-tabs" aria-label="Main navigation">
      <button class="tab-btn active" type="button" data-tab="balance" aria-label="Balance">
        <span class="bank-icon"></span>
      </button>
      <button class="tab-btn tab-center" type="button" data-tab="pay" aria-label="Pay">
        <span>$</span>
      </button>
      <button class="tab-btn" type="button" data-tab="activity" aria-label="Activity">
        <span class="clock-icon"></span><b>2</b>
      </button>
    </nav>

    <section id="addPresetOverlay" class="overlay hidden" aria-hidden="true">
      <div class="dimmed balance-dim"></div>
      <article id="addPresetSheet" class="bottom-sheet add-preset-sheet" role="dialog" aria-modal="true" aria-labelledby="addPresetTitle">
        <div class="grabber"></div>
        <h2 id="addPresetTitle">Add money</h2>
        <p id="addPresetBalance" class="sheet-subtitle">Game balance $0.00</p>

        <div class="preset-grid" id="presetGrid">
          <button type="button" data-cents="1000">$10</button>
          <button type="button" data-cents="2500">$25</button>
          <button type="button" data-cents="5000">$50</button>
          <button type="button" data-cents="10000">$100</button>
          <button type="button" data-cents="20000">$200</button>
          <button id="customAmountBtn" type="button" data-custom="true">•••</button>
        </div>

        <button class="source-row" type="button">
          <span>From</span><i>CARD</i><strong>Zolo debit 2435</strong><em>›</em>
        </button>

        <button id="presetAddBtn" class="wide-action disabled" type="button" disabled>Add</button>
      </article>
    </section>

    <section id="customAddOverlay" class="overlay hidden" aria-hidden="true">
      <article class="full-flow custom-add-flow" role="dialog" aria-modal="true" aria-labelledby="customAddTitle">
        <header class="flow-header center-title-header">
          <button id="closeCustomAdd" class="x-btn" type="button" aria-label="Close"></button>
          <div>
            <h2 id="customAddTitle">Add money</h2>
            <p id="customAddBalance">Game balance $0.00</p>
          </div>
          <span></span>
        </header>

        <section class="custom-add-amount-wrap">
          <div id="customAddAmount" class="amount-display amount-white">$0</div>
        </section>

        <button class="source-row custom-source" type="button">
          <span>From</span><i>CARD</i><strong>Zolo debit 2435</strong><em>›</em>
        </button>

        <button id="customAddSubmit" class="wide-action custom-add-button disabled" type="button" disabled>Add</button>

        <section id="customAddKeypad" class="ios-keypad" aria-label="Custom amount keypad"></section>
      </article>
    </section>

    <section id="peopleOverlay" class="overlay hidden" aria-hidden="true">
      <div class="dimmed green-dim"></div>
      <article class="bottom-sheet people-sheet" role="dialog" aria-modal="true" aria-labelledby="peopleTitle">
        <div class="grabber"></div>
        <div id="peopleTrack" class="people-track">
          <section class="people-page page-one">
            <button id="closePeople" class="x-btn" type="button" aria-label="Close"></button>
            <h2 id="peopleTitle"><span id="peopleVerb">Pay</span> <span id="peopleAmount">$0</span> <em>to</em></h2>

            <div class="search-row">
              <div class="search-field"><span class="search-icon small"></span><input id="peopleSearch" type="text" inputmode="text" autocomplete="off" placeholder="Name, username, email" /></div>
              <button class="scan-icon scan-white" type="button" aria-label="Scan"></button>
            </div>

            <section id="peopleList" class="people-list"></section>
          </section>

          <section class="people-page page-two">
            <button id="backPeople" class="back-arrow" type="button" aria-label="Back"></button>
            <h2 class="note-title"><span id="noteVerb">Pay</span> <span id="noteAmount">$0</span> <em>to</em><br><span id="notePersonAvatar" class="tiny-person"></span><strong id="notePersonName">jasmine t.</strong> <em>for</em></h2>
            <div class="note-line"></div>
            <div class="note-entry-row">
              <input id="noteInput" type="text" autocomplete="off" placeholder="Note (Required)" />
              <button id="reviewBtn" class="review-btn" type="button" disabled>Review</button>
            </div>
          </section>
        </div>
      </article>
    </section>

    <section id="successOverlay" class="success-overlay hidden" aria-hidden="true">
      <div class="success-mark" aria-hidden="true">
        <svg viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="58"></circle>
          <path d="M40 72 L62 94 L101 48"></path>
        </svg>
      </div>
      <h2 id="successTitle">Added</h2>
      <p id="successSub">Game balance updated</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
